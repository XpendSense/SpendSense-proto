name: Publish

on:
  push:
    branches: [main, develop]

jobs:
  publish:
    name: Push to Buf Schema Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        with:
          push: true
          lint: false
          format: false
          breaking: false
