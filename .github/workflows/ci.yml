name: CI

on:
  push:
    branches: [main, develop, 'feature/**']

jobs:
  proto:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          lint: true
          format: true
          breaking: false
          push: false
