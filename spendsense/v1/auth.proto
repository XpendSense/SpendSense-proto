syntax = "proto3";

package spendsense.v1;

option go_package = "github.com/mauro-afa91/spendsense/gen/spendsense/v1;spendsensev1";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc GetGoogleAuthURL(GetGoogleAuthURLRequest) returns (GetGoogleAuthURLResponse);
  rpc ExchangeGoogleCode(ExchangeGoogleCodeRequest) returns (ExchangeGoogleCodeResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
}

message RegisterResponse {
  string access_token = 1;
  string token_type = 2;
  int64 expires_in = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string token_type = 2; // "bearer"
  int64 expires_in = 3; // seconds
}

message LogoutRequest {}

message LogoutResponse {}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  int64 expires_in = 2;
}

message GetGoogleAuthURLRequest {
  string state = 1; // CSRF token from client
  string redirect_uri = 2;
}

message GetGoogleAuthURLResponse {
  string url = 1;
}

message ExchangeGoogleCodeRequest {
  string code = 1;
  string state = 2;
  string redirect_uri = 3;
}

message ExchangeGoogleCodeResponse {
  string access_token = 1;
  int64 expires_in = 2;
  bool is_new_user = 3;
}
