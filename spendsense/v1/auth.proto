syntax = "proto3";

package spendsense.v1;

option go_package = "github.com/mauro-afa91/spendsense/gen/spendsense/v1;spendsensev1";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc GetGoogleAuthURL(GetGoogleAuthURLRequest) returns (GetGoogleAuthURLResponse);
  rpc ExchangeGoogleCode(ExchangeGoogleCodeRequest) returns (ExchangeGoogleCodeResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
  string country_code = 5; // ISO 3166-1 alpha-2, e.g. "US"
  string state_code = 6; // US only, e.g. "CA" — empty for non-US
  string language = 7; // BCP 47 locale code, e.g. "en", "es" — defaults to "en"
  string currency = 8; // ISO 4217 currency code, e.g. "USD" — defaults to "USD"
}

message RegisterResponse {
  string access_token = 1;
  string token_type = 2;
  int64 expires_in = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string token_type = 2; // "bearer"
  int64 expires_in = 3; // seconds
  string language = 4; // user's stored locale preference
  string currency = 5; // user's stored currency preference
}

message LogoutRequest {}

message LogoutResponse {}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  int64 expires_in = 2;
}

message GetGoogleAuthURLRequest {
  string state = 1; // CSRF token from client
  string redirect_uri = 2;
}

message GetGoogleAuthURLResponse {
  string url = 1;
}

message ExchangeGoogleCodeRequest {
  string code = 1;
  string state = 2;
  string redirect_uri = 3;
  string language = 4; // locale from localStorage at callback time — used for new users only
  string currency = 5; // currency from localStorage at callback time — used for new users only
}

message ExchangeGoogleCodeResponse {
  string access_token = 1;
  int64 expires_in = 2;
  bool is_new_user = 3;
  string language = 4; // user's stored locale (new user: from request; returning user: from profile)
  string currency = 5; // user's stored currency (new user: from request; returning user: from profile)
}
