syntax = "proto3";

package spendsense.v1;

import "google/protobuf/timestamp.proto";
import "spendsense/v1/common.proto";

option go_package = "github.com/mauro-afa91/spendsense/gen/spendsense/v1;spendsensev1";

service UserService {
  rpc GetMe(GetMeRequest) returns (GetMeResponse);
  rpc UpdateMe(UpdateMeRequest) returns (UpdateMeResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc DeleteMe(DeleteMeRequest) returns (DeleteMeResponse);
  // Public — no auth required (used during registration).
  rpc ListCountries(ListCountriesRequest) returns (ListCountriesResponse);
}

message User {
  string id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  bool is_active = 5;
  bool is_verified = 6;
  google.protobuf.Timestamp created_at = 7;
  string country_code = 8; // ISO 3166-1 alpha-2, e.g. "US"
  string state_code = 9; // US only, e.g. "CA" — empty for non-US users
  FilingStatus filing_status = 10;
  TaxPaymentFrequency tax_payment_frequency = 11;
  string language = 12; // BCP 47 locale code, e.g. "en", "es"
  string currency = 13; // ISO 4217 currency code, e.g. "USD", "ARS", "EUR"
}

message GetMeRequest {}

message GetMeResponse {
  User user = 1;
}

message UpdateMeRequest {
  string first_name = 1;
  string last_name = 2;
  string country_code = 3;
  string state_code = 4;
  FilingStatus filing_status = 5;
  TaxPaymentFrequency tax_payment_frequency = 6;
  string language = 7; // BCP 47 locale code, e.g. "en", "es"
  string currency = 8; // ISO 4217 currency code, e.g. "USD", "ARS", "EUR"
}

message UpdateMeResponse {
  User user = 1;
}

message ChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message ChangePasswordResponse {}

message DeleteMeRequest {}

message DeleteMeResponse {}

// ─── Countries ───────────────────────────────────────────────────────────────

message CountryFeature {
  string name = 1;
  bool is_enabled = 2;
}

message Country {
  string code = 1; // ISO 3166-1 alpha-2
  string name = 2;
  bool is_enabled = 3;
  repeated CountryFeature features = 4;
}

message ListCountriesRequest {}

message ListCountriesResponse {
  repeated Country countries = 1;
}
