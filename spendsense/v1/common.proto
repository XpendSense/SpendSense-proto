syntax = "proto3";

package spendsense.v1;

option go_package = "github.com/mauro-afa91/spendsense/gen/spendsense/v1;spendsensev1";

// Fixed-point money representation to avoid float precision issues.
// amount = units + nanos / 1_000_000_000
message Money {
  int64 units = 1;
  int32 nanos = 2;
  string currency = 3; // e.g. "USD"
}

enum RecurringType {
  RECURRING_TYPE_UNSPECIFIED = 0;
  RECURRING_TYPE_ONE_OFF = 1;
  RECURRING_TYPE_WEEKLY = 2;
  RECURRING_TYPE_BI_WEEKLY = 3;
  RECURRING_TYPE_MONTHLY = 4;
  RECURRING_TYPE_YEARLY = 5;
}

enum ExpenseType {
  EXPENSE_TYPE_UNSPECIFIED = 0;
  EXPENSE_TYPE_FIXED = 1;
  EXPENSE_TYPE_VARIABLE = 2;
}

enum PaymentType {
  PAYMENT_TYPE_UNSPECIFIED = 0;
  PAYMENT_TYPE_CASH = 1;
  PAYMENT_TYPE_CREDIT = 2;
  PAYMENT_TYPE_DEBIT = 3;
  PAYMENT_TYPE_DIGITAL_WALLET = 4;
  PAYMENT_TYPE_BANK_TRANSFER = 5;
  PAYMENT_TYPE_CRYPTO = 6;
  PAYMENT_TYPE_INVESTMENT = 7;
  PAYMENT_TYPE_OTHER = 99;
}

// How often a budget profile cycles into a new period.
enum BudgetCycle {
  BUDGET_CYCLE_UNSPECIFIED = 0;
  BUDGET_CYCLE_WEEKLY = 1;
  BUDGET_CYCLE_BI_WEEKLY = 2;
  BUDGET_CYCLE_MONTHLY = 3;
  BUDGET_CYCLE_YEARLY = 4;
}

// How an income source is earned — determines whether a default amount applies.
enum IncomeType {
  INCOME_TYPE_UNSPECIFIED = 0;
  INCOME_TYPE_SALARY = 1; // fixed monthly/annual — default_amount applies
  INCOME_TYPE_HOURLY = 2; // variable — default_amount = 0, user fills in each period
  INCOME_TYPE_FREELANCE = 3; // variable
  INCOME_TYPE_CONTRACTOR = 4; // project-based
  INCOME_TYPE_INVESTMENT = 5; // dividends, rental, etc.
  INCOME_TYPE_OTHER = 99;
}
